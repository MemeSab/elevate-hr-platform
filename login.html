<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | Intelligent OD</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            background: #FFFFFF;
            position: relative;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #FFFFFF;
            z-index: 1;
        }

        .auth-card {
            background: #FFFFFF;
            padding: var(--spacing-xl);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            z-index: 10;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .auth-logo {
            font-family: var(--heading-font);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }

        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
        }

        .form-switcher {
            display: flex;
            margin-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
        }

        .switch-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 1rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            font-size: 1rem;
        }

        .switch-btn.active {
            color: var(--primary-accent);
        }

        .switch-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary-accent);
        }

        .full-width-btn {
            width: 100%;
            margin-top: var(--spacing-md);
        }

        .social-login {
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .social-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 10;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .back-home:hover {
            color: var(--text-primary);
        }

        .form-group label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: block;
            font-weight: 500;
        }

        .auth-card form a {
            color: var(--text-secondary) !important;
            transition: color 0.3s;
            opacity: 0.7;
        }

        .auth-card form a:hover {
            color: var(--primary-accent) !important;
            opacity: 1;
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-home">&larr; Back to Home</a>

    <div class="auth-page">
        <div class="auth-card fade-up">
            <div class="auth-logo">
                <a href="index.html" class="navbar-brand"><img src="images/logo-transparent.png" alt="Intelligent OD Logo"
                        style="height: 50px; width: auto; display: block; margin: 0 auto;"></a>
            </div>
            <p class="auth-subtitle">Welcome to your HR masterclass hub.</p>

            <div class="form-switcher">
                <button class="switch-btn active" onclick="switchTab('login')">Log In</button>
                <button class="switch-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="contact-form">
                <div class="form-group" style="text-align: left;">
                    <label>Email Address</label>
                    <input type="email" placeholder="jane@example.com" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary full-width-btn">Log In</button>
                <a href="#"
                    style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 1rem; display: block; opacity: 0.7;">Forgot
                    password?</a>
            </form>

            <!-- Sign Up Form (Hidden by default) -->
            <form id="signup-form" class="contact-form" style="display: none;">
                <div class="form-group" style="text-align: left;">
                    <label>Full Name</label>
                    <input type="text" placeholder="Jane Doe" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Email Address</label>
                    <input type="email" placeholder="jane@example.com" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Password</label>
                    <input type="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn-primary full-width-btn">Create Free Account</button>
            </form>

            <div class="social-login">
                <button class="social-btn" id="google-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Continue with Google
                </button>
                <button class="social-btn" style="margin-top: 10px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                    </svg>
                    Continue with LinkedIn
                </button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const btns = document.querySelectorAll('.switch-btn');

            btns.forEach(btn => btn.classList.remove('active'));

            if (tab === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                btns[0].classList.add('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                btns[1].classList.add('active');
            }
        }

        // Ensure user is running via HTTP server
        if (window.location.protocol === 'file:') {
            alert('Wait! You are opening this file directly (file://). Firebase Modules require a local web server (http://localhost) to work securely. Please run a local server to test Authentication.');
        }
    </script>
    <!-- Firebase Core & Client Config (Module required for modern Firebase SDK) -->
    <script type="module" src="js/firebaseClient.js"></script>
    <script type="module">
        import { handleEmailPasswordLogin, handleEmailPasswordSignup, handleGoogleLogin, observeAuthState } from './js/firebaseClient.js';

        // Auto-redirect if already logged in
        observeAuthState((user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        // Login Form Registration
        const loginForm = document.getElementById('login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = loginForm.querySelector('input[type="email"]').value;
                const password = loginForm.querySelector('input[type="password"]').value;

                // UX Feedback
                const btn = loginForm.querySelector('button[type="submit"]');
                const originalText = btn.textContent;
                btn.textContent = 'Logging in...';

                const { user, error } = await handleEmailPasswordLogin(email, password);

                if (error) {
                    alert('Login failed: ' + error.message);
                    btn.textContent = originalText;
                } else {
                    window.location.href = 'dashboard.html';
                }
            });
        }

        // Signup Form Registration
        const signupForm = document.getElementById('signup-form');
        if (signupForm) {
            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const fullName = signupForm.querySelector('input[type="text"]').value;
                const email = signupForm.querySelector('input[type="email"]').value;
                const password = signupForm.querySelector('input[type="password"]').value;

                // UX Feedback
                const btn = signupForm.querySelector('button[type="submit"]');
                const originalText = btn.textContent;
                btn.textContent = 'Creating Account...';

                const { user, error } = await handleEmailPasswordSignup(email, password, fullName);

                if (error) {
                    alert('Registration failed: ' + error.message);
                    btn.textContent = originalText;
                } else {
                    window.location.href = 'dashboard.html';
                }
            });
        }

        // Google Auth Button
        const googleBtn = document.getElementById('google-btn');
        if (googleBtn) {
            googleBtn.addEventListener('click', async (e) => {
                e.preventDefault();

                const originalText = googleBtn.innerHTML;
                googleBtn.innerHTML = 'Connecting to Google...';

                const { user, error } = await handleGoogleLogin();

                if (error) {
                    alert('Google login failed: ' + error.message);
                    googleBtn.innerHTML = originalText;
                } else {
                    window.location.href = 'dashboard.html';
                }
            });
        }
    </script>
</body>

</html>
